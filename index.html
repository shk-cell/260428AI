<!DOCTYPE html>
<html lang="ko">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 동영상 페이지</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }

      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .video-section h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      color: #333;
    }
    video {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="video-section">

      <source src="Soccer.mp4" type="video/mp4">
      동영상을 재생할 수 없습니다.
    </video>
  </div>

  <div class="video-section">

</html>
